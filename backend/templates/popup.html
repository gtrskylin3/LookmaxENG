<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #212121;
            color: #ececec;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .popup-card {
            height: 100%;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #2f2f2f;
            border: 1px solid #424242;
            border-radius: 12px;
            position: relative;
        }

        .popup-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 4px;
            background-color: #10a37f;
            border-radius: 0 4px 4px 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-left: 6px;
        }

        .word {
            font-size: 1.15rem;
            color: #ffffff;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.3px;
        }

        .translation {
            font-size: 0.95rem;
            color: #10a37f;
            font-weight: 600;
            line-height: 1.2;
        }

        .context {
            font-size: 0.75rem;
            color: #8e8e8e;
            font-style: italic;
            margin-top: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="popup-card">
        <div class="content">
            <div class="word">{{ word }}</div>
            <div class="translation">{{ translation }}</div>
            {% if context %}
                <div class="context">Context: {{ context }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
