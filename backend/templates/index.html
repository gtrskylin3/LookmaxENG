<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Boost</title>
    <style>
        /* Глобальный сброс для точного расчета размеров */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Блокируем прокрутку всей страницы на ПК */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #212121; /* Основной темный фон */
            color: #ececec; /* Светлый текст */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Контейнер строго ограничен по высоте экрана */
        .container {
            width: 100%;
            max-width: 1100px; /* Оптимальная ширина для 3 колонок + сайдбара */
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            margin: 10px 0 20px 0;
            color: #ffffff;
            letter-spacing: -0.5px;
            flex-shrink: 0; /* Шапка не сжимается */
        }

        /* Главный двухколоночный макет */
        .main-layout {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr; /* Словарь чуть шире формы */
            gap: 24px;
            flex-grow: 1;
            min-height: 0; /* Позволяет дочерним элементам скроллиться внутри */
        }

        /* ЛЕВАЯ КОЛОНКА (Словарь) — скроллится только она */
        .dictionary-section {
            height: 100%;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Настройка красивого тонкого скроллбара */
        .dictionary-section::-webkit-scrollbar {
            width: 6px;
        }

        .dictionary-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .dictionary-section::-webkit-scrollbar-thumb {
            background-color: #424242;
            border-radius: 10px;
        }

        .dictionary-section::-webkit-scrollbar-thumb:hover {
            background-color: #4f4f4f;
        }

        /* Для Firefox */
        .dictionary-section {
            scrollbar-width: thin;
            scrollbar-color: #424242 transparent;
        }

        /* Сетка слов (3 колонки) */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* Компактная карточка слова */
        li {
            background-color: #2f2f2f;
            border: 1px solid #424242;
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: background-color 0.2s, border-color 0.2s;
            min-width: 0; /* Защита от переполнения */
        }

        li:hover {
            background-color: #353535;
            border-color: #4f4f4f;
        }

        /* Информация внутри карточки */
        .word-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: calc(100% - 20px);
            word-break: break-word;
        }

        .word-main {
            font-size: 0.95rem;
            color: #ffffff;
            font-weight: 600;
            line-height: 1.2;
        }

        .word-translate {
            font-size: 0.85rem;
            color: #b4b4b4;
            font-weight: 400;
            line-height: 1.2;
        }

        .word-context {
            font-size: 0.75rem;
            color: #8e8e8e;
            margin-top: 2px;
            font-style: italic;
            line-height: 1.2;
        }

        /* Кнопка удаления */
        .btn-delete {
            background: none;
            font-size: 0.8rem;
            padding: 2px;
            border-radius: 4px;
            opacity: 0.4;
            flex-shrink: 0;
            transition: opacity 0.2s, background-color 0.2s;
        }

        .btn-delete:hover {
            opacity: 1;
            background-color: rgba(239, 68, 68, 0.15);
        }

        /* ПРАВАЯ КОЛОНКА (Сайдбар с формой) */
        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        .form-section {
            background-color: #2f2f2f;
            border: 1px solid #424242;
            border-radius: 16px;
            padding: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.8rem;
            color: #b4b4b4;
            font-weight: 500;
        }

        input[type="text"] {
            background-color: #212121;
            border: 1px solid #424242;
            border-radius: 8px;
            color: #ffffff;
            padding: 10px 12px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: #10a37f; /* Фирменный зеленый */
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.15);
        }

        /* Кнопки */
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: #10a37f;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #1a7f64;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #424242;
            color: #ececec;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background-color: #353535;
            border-color: #b4b4b4;
        }

        /* Адаптивность для планшетов и телефонов */
        @media (max-width: 768px) {
            html, body {
                overflow: auto; /* Возвращаем стандартный скролл на мобилках */
                height: auto;
            }
            body {
                padding: 15px 10px;
            }
            .container {
                height: auto;
            }
            .main-layout {
                grid-template-columns: 1fr; /* Колонки встают друг под друга */
                gap: 20px;
                height: auto;
            }
            .sidebar-section {
                order: -1; /* Форма добавления уходит наверх */
                height: auto;
            }
            .dictionary-section {
                max-height: 500px; /* На мобильных ограничиваем высоту словаря фиксированно */
            }
            ul {
                grid-template-columns: repeat(2, 1fr); /* 2 колонки на средних экранах */
            }
        }

        @media (max-width: 480px) {
            ul {
                grid-template-columns: 1fr; /* 1 колонка на совсем маленьких экранах */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>dictionary😎</h1>
        
        <div class="main-layout">
            
            <div class="dictionary-section">
                <ul>
                    {% for word in words %}
                        <li>
                            <div class="word-info">
                                <span class="word-main">{{word.word}}</span>
                                <span class="word-translate">{{word.translate}}</span>
                                {% if word.context %}
                                    <span class="word-context">Context: {{word.context}}</span>
                                {% endif %}
                            </div>
                            <div>
                                <form action="/delete" method="post" style="display: inline;">
                                    <input type="hidden" name="id" value="{{ word.id }}">
                                    <button type="submit" class="btn-delete" title="Delete">❌</button>
                                </form>
                            </div>
                        </li>
                    {% endfor %}
                </ul>
            </div>

            <div class="sidebar-section">
                <div class="form-section">
                    <form action="/" method="post">
                        <div class="form-group">
                            <div class="input-field">
                                <label for="word">Word</label>
                                <input type="text" id="word" name="word" required autocomplete="off">
                            </div>
                            
                            <div class="input-field">
                                <label for="translate">Translation</label>
                                <input type="text" id="translate" name="translate" autocomplete="off">
                            </div>
                            
                            <div class="input-field">
                                <label for="context">Context</label>
                                <input type="text" id="context" name="context" autocomplete="off">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-primary">Add new word</button>
                    </form>
                </div>

                <div>
                    <form action="/export-anki" method="post">
                        <button type="submit" class="btn-secondary">Export dict to Anki (.apkg file)</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
